<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, viewport-fit=cover">
    <title>长截图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }
        .img-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">加载中...</div>
    <div class="img-container">
        <img src="4815a61bc6d98a346ff94c71048e76a3.jpg" alt="截图" id="screenshot"
             onload="document.getElementById('loading').style.display='none'"
             onerror="document.getElementById('loading').textContent='加载失败'">
    </div>
</body>
</html>
